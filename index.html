<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbiology Quiz - Clinical Infectious Diseases</title>
    <style>
        :root {
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600-rgb: 94, 82, 64;
            --color-red-500: rgba(192, 21, 47, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-cream-50: var(--color-charcoal-700);
                --color-cream-100: var(--color-charcoal-800);
                --color-teal-500: var(--color-teal-300);
                --color-teal-600: var(--color-teal-300);
                --color-slate-900: var(--color-gray-200);
                --color-slate-500: rgba(167, 169, 169, 0.7);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-cream-50);
            color: var(--color-slate-900);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            color: var(--color-slate-900);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--color-slate-500);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            align-items: center;
        }

        .controls label {
            font-weight: 500;
            color: var(--color-slate-900);
        }

        select, button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(var(--color-brown-600-rgb), 0.2);
            background: var(--color-cream-100);
            color: var(--color-slate-900);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button {
            background: var(--color-teal-500);
            color: white;
            border: none;
            font-weight: 500;
        }

        button:hover {
            background: var(--color-teal-600);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            background: var(--color-cream-100);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(var(--color-brown-600-rgb), 0.12);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--color-slate-500);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--color-teal-500);
        }

        .question-card {
            background: var(--color-cream-100);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(var(--color-brown-600-rgb), 0.12);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-number {
            font-size: 0.9rem;
            color: var(--color-slate-500);
            font-weight: 500;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 25px;
            color: var(--color-slate-900);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid rgba(var(--color-brown-600-rgb), 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--color-cream-50);
        }

        .option:hover {
            border-color: var(--color-teal-500);
            background: var(--color-cream-100);
        }

        .option.selected {
            border-color: var(--color-teal-500);
            background: rgba(33, 128, 141, 0.1);
        }

        .option.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .option.incorrect {
            border-color: var(--color-red-500);
            background: rgba(192, 21, 47, 0.1);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-label {
            font-weight: 600;
            margin-right: 10px;
            color: var(--color-teal-600);
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background: rgba(var(--color-brown-600-rgb), 0.05);
            border-left: 4px solid var(--color-teal-500);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--color-slate-900);
        }

        .feedback-text {
            line-height: 1.7;
            color: var(--color-slate-900);
        }

        .navigation {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .results-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .results-modal.show {
            display: flex;
        }

        .results-content {
            background: var(--color-cream-100);
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .results-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--color-slate-900);
        }

        .results-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--color-teal-500);
            margin: 20px 0;
        }

        .results-details {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }

        .result-item {
            text-align: center;
        }

        .result-item-label {
            font-size: 0.9rem;
            color: var(--color-slate-500);
            margin-bottom: 5px;
        }

        .result-item-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-slate-900);
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .question-card {
                padding: 20px;
            }

            .results-content {
                padding: 30px 20px;
            }
        }
    </style>

<body>
    <div class="container">
        <header>
            <h1>🦠 Microbiology Quiz</h1>
            <p class="subtitle">Clinical Infectious Diseases - NCLEX-Style Questions</p>
        </header>

        <div class="controls">
            <div>
                <label for="mode-select">Mode:</label>
                <select id="mode-select">
                    <option value="practice">Practice Mode</option>
                    <option value="exam">Exam Mode</option>
                </select>
            </div>
            <button id="reset-btn">Reset Quiz</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div class="stat-value" id="progress">0/80</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Correct</div>
                <div class="stat-value" id="correct">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Incorrect</div>
                <div class="stat-value" id="incorrect">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0%</div>
            </div>
        </div>

        <div id="quiz-container"></div>

        <div class="navigation">
            <button id="prev-btn" disabled>← Previous</button>
            <button id="next-btn">Next →</button>
            <button id="submit-btn" style="display: none;">Submit Quiz</button>
        </div>
    </div>

    <div class="results-modal" id="results-modal">
        <div class="results-content">
            <h2 class="results-title">Quiz Complete! 🎉</h2>
            <div class="results-score" id="final-score">0%</div>
            <div class="results-details">
                <div class="result-item">
                    <div class="result-item-label">Correct</div>
                    <div class="result-item-value" id="final-correct">0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">Incorrect</div>
                    <div class="result-item-value" id="final-incorrect">0</div>
                </div>
            </div>
            <button id="close-results" style="margin-top: 20px;">Review Answers</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "A patient presents with a fever and a suspected bacterial infection. The laboratory report indicates a Gram-positive organism that forms clusters under the microscope. Which of the following organisms is most likely responsible?",
                options: {
                    A: "Streptococcus pneumoniae",
                    B: "Staphylococcus aureus",
                    C: "Escherichia coli",
                    D: "Neisseria meningitidis",
                    E: "Streptococcus pyogenes"
                },
                correct: "B",
                rationale: "S. aureus is a Gram-positive cocci that characteristically forms clusters."
            },
            {
                id: 2,
                text: "A nurse is reviewing the lab results for a patient with a suspected viral infection. Which characteristic of viruses should the nurse keep in mind?",
                options: {
                    A: "They typically range from 0.1 to 10 μm in size.",
                    B: "They are easily cultured on standard agar plates.",
                    C: "They can only be visualized using an electron microscope (EM).",
                    D: "They consist of thick peptidoglycan cell walls.",
                    E: "They are visible under a standard laboratory light microscope."
                },
                correct: "C",
                rationale: "Viruses are too small (0.03-0.3 μm) to be seen under lab microscopes and require EM."
            },
            {
                id: 3,
                text: "When collecting a sputum sample for a patient with suspected pneumonia, the nurse notes the lab report mentions \"high count of epithelial cells.\" How should this be interpreted?",
                options: {
                    A: "The infection is progressing rapidly.",
                    B: "The sample is of high quality and ready for culture.",
                    C: "The sample is poorly taken and likely represents saliva contamination.",
                    D: "The patient has a viral rather than a bacterial infection.",
                    E: "The antibiotic treatment is already effective."
                },
                correct: "C",
                rationale: "High epithelial cell counts in sputum microscopy suggest the sample is contaminated with oral flora rather than deep lung secretions."
            },
            {
                id: 4,
                text: "A patient is suspected of having a Clostridium difficile infection. Which diagnostic test is the gold standard for routine laboratory diagnosis based on the source context?",
                options: {
                    A: "Aerobic blood culture",
                    B: "Stool culture on agar plates",
                    C: "Stool test for C. diff toxin",
                    D: "Gram stain of the stool",
                    E: "PCR of the blood"
                },
                correct: "C",
                rationale: "Stool culture is not routinely performed for C. diff; instead, toxin detection is the preferred method."
            },
            {
                id: 5,
                text: "A nurse is preparing to swab a chronic diabetic foot ulcer. Which action is most appropriate to ensure a representative sample is obtained?",
                options: {
                    A: "Swab the superficial debris and pus first.",
                    B: "Cleanse and debride the wound before obtaining the specimen.",
                    C: "Use a dry swab on the surface of the wound without pressure.",
                    D: "Avoid deep tissue samples to prevent patient pain.",
                    E: "Sample the skin surrounding the ulcer rather than the base."
                },
                correct: "B",
                rationale: "Cleanse/debride first and obtain deep tissue or aspirate, as surface swabs only detect colonizers."
            },
            {
                id: 6,
                text: "A medical report indicates a \"Gram-negative diplococci\" found in a patient's urethral discharge. This morphology is characteristic of which organism?",
                options: {
                    A: "Chlamydia trachomatis",
                    B: "Escherichia coli",
                    C: "Staphylococcus aureus",
                    D: "Neisseria gonorrhoeae",
                    E: "Treponema pallidum"
                },
                correct: "D",
                rationale: "N. gonorrhoeae is specifically described as a Gram-negative diplococci."
            },
            {
                id: 7,
                text: "A patient with a central venous line develops a fever. Two sets of blood cultures are taken: one from the line and one from a peripheral vein. The line culture turns positive for Staphylococcus epidermidis 3 hours before the peripheral culture. This indicates:",
                options: {
                    A: "Skin contamination during the peripheral draw.",
                    B: "A true catheter-related bloodstream infection.",
                    C: "The patient is immunocompetent and fighting the infection.",
                    D: "The lab performed the test incorrectly.",
                    E: "A secondary infection in the lungs."
                },
                correct: "B",
                rationale: "A \"Differential Time to Positivity\" of ≥2 hours (line culture turning positive before peripheral) is a specific marker for line-associated infection."
            },
            {
                id: 8,
                text: "Which of the following organisms is known as the \"Vietnamese time bomb\" because it can remain latent for decades?",
                options: {
                    A: "Mycobacterium tuberculosis",
                    B: "Burkholderia pseudomallei",
                    C: "Pseudomonas aeruginosa",
                    D: "Salmonella typhi",
                    E: "Clostridium tetani"
                },
                correct: "B",
                rationale: "This organism causes Melioidosis and is classically nicknamed the \"Vietnamese time bomb.\""
            },
            {
                id: 9,
                text: "A patient is diagnosed with a urinary tract infection (UTI) caused by Proteus mirabilis. The nurse should monitor the patient for which specific complication associated with this organism?",
                options: {
                    A: "Rapidly progressing necrotizing fasciitis.",
                    B: "Formation of staghorn kidney stones.",
                    C: "Development of a non-blanching rash.",
                    D: "Flaccid paralysis of the respiratory muscles.",
                    E: "Rice-water stools."
                },
                correct: "B",
                rationale: "Proteus produces urease, which alkalinizes urine and leads to struvite (staghorn) calculi."
            },
            {
                id: 10,
                text: "A nurse is managing a patient with a suspected infection in a \"sterile body site.\" Which site is considered sterile?",
                options: {
                    A: "The skin surface",
                    B: "The distal urethra",
                    C: "Cerebrospinal fluid (CSF)",
                    D: "The oral cavity",
                    E: "Chronic wound exudate"
                },
                correct: "C",
                rationale: "CSF, blood, and joint fluid are considered sterile body sites. The urethra and skin are non-sterile."
            },
            {
                id: 11,
                text: "A 70-year-old patient has a urine culture showing 100,000 CFU/ml of E. coli but denies any symptoms such as dysuria or frequency. What is the standard management for this patient?",
                options: {
                    A: "Immediate start of IV Ceftriaxone.",
                    B: "A 3-day course of oral Nitrofurantoin.",
                    C: "No antibiotic treatment is required.",
                    D: "Repeat the culture using a catheter specimen.",
                    E: "Start long-term antibiotic prophylaxis."
                },
                correct: "C",
                rationale: "This patient has Asymptomatic Bacteriuria (ASB). Treatment is generally not recommended for those over 65 unless they are pregnant or undergoing surgery."
            },
            {
                id: 12,
                text: "In which clinical scenario is treatment for asymptomatic bacteriuria (ASB) mandatory?",
                options: {
                    A: "An elderly patient in a long-term care facility.",
                    B: "A patient with a long-term indwelling catheter.",
                    C: "A pregnant woman.",
                    D: "A healthy young woman with a first-time finding.",
                    E: "A patient with well-controlled Type 2 Diabetes."
                },
                correct: "C",
                rationale: "Pregnant women are a primary exception where ASB must be treated to prevent pyelonephritis and fetal risks."
            },
            {
                id: 13,
                text: "A patient is admitted with suspected bacterial meningitis. What is the priority sequence of care?",
                options: {
                    A: "Wait for CSF culture results (3 days) before starting antibiotics.",
                    B: "Give steroids, then start immediate IV antibiotics, potentially before the lumbar puncture.",
                    C: "Perform the lumbar puncture and wait for the Gram stain (1 day) to choose the drug.",
                    D: "Administer oral Amoxicillin immediately.",
                    E: "Isolate the patient in a positive-pressure room."
                },
                correct: "B",
                rationale: "Bacterial meningitis is a medical emergency; antibiotics should be started ASAP, often before lab confirmation."
            },
            {
                id: 14,
                text: "A lab report for a patient with a sore throat shows \"Gram-positive cocci in chains\" and \"Beta-hemolytic.\" Which complication is associated with this organism?",
                options: {
                    A: "Staghorn calculi",
                    B: "Rheumatic heart disease",
                    C: "Gas gangrene",
                    D: "Toxic megacolon",
                    E: "Rice-water stools"
                },
                correct: "B",
                rationale: "Streptococcus pyogenes (Group A Strep) can lead to post-infection immune complications like rheumatic fever."
            },
            {
                id: 15,
                text: "Which antibiotic is considered the \"first-line\" broad-spectrum choice but cannot cross the blood-brain barrier (BBB)?",
                options: {
                    A: "Ceftriaxone",
                    B: "Meropenem",
                    C: "Augmentin (Co-amoxiclav)",
                    D: "Benzylpenicillin",
                    E: "Vancomycin"
                },
                correct: "C",
                rationale: "Augmentin is broad-spectrum (covering aerobes and anaerobes) but its clavulanic acid component cannot cross the BBB."
            },
            {
                id: 16,
                text: "A patient is diagnosed with Methicillin-resistant Staphylococcus aureus (MRSA). Which antibiotic is effective for treating a serious infection with this organism?",
                options: {
                    A: "Cloxacillin",
                    B: "Ceftriaxone",
                    C: "Vancomycin",
                    D: "Meropenem",
                    E: "Tazocin"
                },
                correct: "C",
                rationale: "Vancomycin is the standard treatment for serious MRSA infections as beta-lactams (penicillins, carbapenems) are ineffective."
            },
            {
                id: 17,
                text: "A patient presents with a \"sardonic grin\" and \"lockjaw.\" The nurse should suspect:",
                options: {
                    A: "Botulism",
                    B: "Tetanus",
                    C: "Syphilis",
                    D: "Meningococcal sepsis",
                    E: "Melioidosis"
                },
                correct: "B",
                rationale: "Lockjaw, sardonic grin, and opisthotonus are hallmark clinical features of Clostridium tetani toxin."
            },
            {
                id: 18,
                text: "What is the primary reason for differentiating between cystitis and pyelonephritis?",

                rationale: "Malaria is diagnosed via microscopy of thick and thin blood films, usually analyzed by the Haematology department."
            },
            {
                id: 73,
                text: "Which of the following is a characteristic of \"Latent TB Infection\" (LTBI)?",
                options: {
                    A: "The patient is highly infectious.",
                    B: "The patient shows symptoms like chronic cough and night sweats.",
                    C: "The patient is asymptomatic and non-infectious.",
                    D: "The patient has a positive AFB sputum smear.",
                    E: "The patient requires RIPE therapy for 2 weeks."
                },
                correct: "C",
                rationale: "Patients with Latent TB (LTBI) do not have symptoms and cannot spread the disease to others."
            },
            {
                id: 74,
                text: "A nurse is educating a patient about HPV vaccination. The nurse correctly states:",
                options: {
                    A: "The vaccine treats existing HPV infections.",
                    B: "The vaccine protects against all types of HPV.",
                    C: "The vaccine protects against high-risk types 16 and 18.",
                    D: "Vaccination is only necessary for those with multiple partners.",
                    E: "The vaccine is a live virus and should be avoided by the immunocompromised."
                },
                correct: "C",
                rationale: "High-risk types 16 and 18 are responsible for the majority of cervical cancers."
            },
            {
                id: 75,
                text: "\"De-escalation\" in antibiotic therapy refers to:",
                options: {
                    A: "Increasing the dose of a broad-spectrum antibiotic.",
                    B: "Switching from a broad-spectrum to a narrower-spectrum antibiotic once lab results are available.",
                    C: "Stopping all antibiotics when the patient feels better.",
                    D: "Moving the patient from IV to oral antibiotics on the first day.",
                    E: "Using two narrow-spectrum drugs instead of one broad-spectrum drug."
                },
                correct: "B",
                rationale: "De-escalation is a core strategy of antimicrobial stewardship to refine therapy."
            },
            {
                id: 76,
                text: "Which condition is a \"surgical emergency\" where 1 in 10 patients may lose an eye?",
                options: {
                    A: "Conjunctivitis",
                    B: "Keratitis",
                    C: "Post-traumatic endophthalmitis",
                    D: "Diabetic retinopathy",
                    E: "Ocular toxoplasmosis"
                },
                correct: "C",
                rationale: "Post-traumatic endophthalmitis is described as a surgical emergency where 1 in 10 patients lose the eye."
            },
            {
                id: 77,
                text: "A patient with a heart valve replacement is at risk for endocarditis. Which group of organisms is the most common cause of \"native valve endocarditis\"?",
                options: {
                    A: "Staphylococcus aureus",
                    B: "Alpha-haemolytic Streptococci (e.g., Strep viridans)",
                    C: "Escherichia coli",
                    D: "Candida albicans",
                    E: "Pseudomonas aeruginosa"
                },
                correct: "B",
                rationale: "Alpha-haemolytic Strep is the most common cause of native valve endocarditis."
            },
            {
                id: 78,
                text: "Which of the following organisms is resistant to all Cephalosporins?",
                options: {
                    A: "Streptococcus pneumoniae",
                    B: "Escherichia coli",
                    C: "Listeria monocytogenes",
                    D: "Klebsiella pneumoniae",
                    E: "Neisseria meningitidis"
                },
                correct: "C",
                rationale: "Listeria is noted as being \"intrinsically resistant to cephalosporins.\""
            },
            {
                id: 79,
                text: "A patient is suspected of having a viral respiratory infection. Which color top swab with UTM/VTM should the nurse use?",
                options: {
                    A: "Blue",
                    B: "Red",
                    C: "Green",
                    D: "Yellow",
                    E: "White"
                },
                correct: "B",
                rationale: "Red-top flocked swabs with UTM or VTM are used for viral culture and PCR."
            },
            {
                id: 80,
                text: "For a \"standard precaution,\" when should a nurse perform hand hygiene?",
                options: {
                    A: "Only after touching blood or body fluids.",
                    B: "Before and after every patient contact.",
                    C: "Only when hands are visibly soiled.",
                    D: "Once at the start of the shift and once at the end.",
                    E: "Only after removing gloves."
                },
                correct: "B",
                rationale: "Standard precautions dictate hand hygiene before and after patient contact, regardless of glove use."
            }
        ];

        let currentQuestion = 0;
        let userAnswers = {};
        let mode = 'practice';

        const quizContainer = document.getElementById('quiz-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const modeSelect = document.getElementById('mode-select');
        const resetBtn = document.getElementById('reset-btn');
        const resultsModal = document.getElementById('results-modal');
        const closeResults = document.getElementById('close-results');

        function renderQuestion() {
            const q = questions[currentQuestion];
            const userAnswer = userAnswers[q.id];
            const showFeedback = mode === 'practice' && userAnswer;

            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Question ${currentQuestion + 1} of ${questions.length}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
            `;

            for (const [key, value] of Object.entries(q.options)) {
                const isSelected = userAnswer === key;
                const isCorrect = key === q.correct;
                let className = 'option';
                
                if (showFeedback) {
                    className += ' disabled';
                    if (isSelected && isCorrect) className += ' correct';
                    if (isSelected && !isCorrect) className += ' incorrect';
                    if (!isSelected && isCorrect) className += ' correct';
                } else if (isSelected) {
                    className += ' selected';
                }

                html += `
                    <div class="${className}" onclick="selectAnswer('${key}')">
                        <span class="option-label">${key}.</span>${value}
                    </div>
                `;
            }

            html += `</div>`;

            if (showFeedback) {
                html += `
                    <div class="feedback">
                        <div class="feedback-title">
                            ${userAnswer === q.correct ? '✓ Correct!' : '✗ Incorrect'}
                        </div>
                        <div class="feedback-text">
                            <strong>Correct Answer: ${q.correct}</strong><br>
                            ${q.rationale}
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            quizContainer.innerHTML = html;

            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }

            updateStats();
        }

        function selectAnswer(answer) {
            const q = questions[currentQuestion];
            const userAnswer = userAnswers[q.id];
            
            if (mode === 'practice' && userAnswer) return;

            userAnswers[q.id] = answer;
            renderQuestion();
        }

        function updateStats() {
            const answered = Object.keys(userAnswers).length;
            let correct = 0;
            let incorrect = 0;

            questions.forEach(q => {
                if (userAnswers[q.id]) {
                    if (userAnswers[q.id] === q.correct) {
                        correct++;
                    } else {
                        incorrect++;
                    }
                }
            });

            document.getElementById('progress').textContent = `${answered}/${questions.length}`;
            document.getElementById('correct').textContent = correct;
            document.getElementById('incorrect').textContent = incorrect;
            
            const score = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            document.getElementById('score').textContent = `${score}%`;
        }

        function showResults() {
            let correct = 0;
            questions.forEach(q => {
                if (userAnswers[q.id] === q.correct) correct++;
            });

            const percentage = Math.round((correct / questions.length) * 100);
            
            document.getElementById('final-score').textContent = `${percentage}%`;
            document.getElementById('final-correct').textContent = correct;
            document.getElementById('final-incorrect').textContent = questions.length - correct;
            
            resultsModal.classList.add('show');
        }

        prevBtn.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        });

        submitBtn.addEventListener('click', () => {
            showResults();
        });

        closeResults.addEventListener('click', () => {
            resultsModal.classList.remove('show');
        });

        modeSelect.addEventListener('change', (e) => {
            mode = e.target.value;
            renderQuestion();
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('Reset quiz and clear all answers?')) {
                currentQuestion = 0;
                userAnswers = {};
                renderQuestion();
            }
        });

        renderQuestion();
    </script>
</body>
</html>
